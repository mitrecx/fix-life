# HTTP to HTTPS redirect for fixlife.mitrecx.top
server {
    listen 80;
    server_name fixlife.mitrecx.top;
    return 301 https://$host$request_uri;
}

# HTTPS server for fixlife.mitrecx.top
server {
    listen 443 ssl http2;
    server_name fixlife.mitrecx.top;

    ssl_certificate /etc/nginx/ssl/fix-life/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/fix-life/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /opt/fix-life/frontend/dist;
    index index.html;

    # Handle static assets first
    location /assets/ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Backend API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Frontend SPA routing
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public";
    }
}

# Reject all other domains
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}