# Production Nginx for fixlife.mitrecx.top
# TLS: Let's Encrypt (Certbot, auto-renew via certbot-renew.timer).
# HTTP-01: webroot /var/www/certbot — keep the acme location before HTTPS redirect.

# HTTP: ACME + redirect
server {
    listen 80;
    server_name fixlife.mitrecx.top;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name fixlife.mitrecx.top;

    ssl_certificate /etc/letsencrypt/live/fixlife.mitrecx.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fixlife.mitrecx.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /opt/fix-life/frontend/dist;
    index index.html;

    location /assets/ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public";
    }
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}
